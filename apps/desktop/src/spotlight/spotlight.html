<!doctype html>
<!--
  FORK (klappstuhl): standalone Quick Access spotlight UI.
  Self-contained static page (inline CSS + JS), loaded into a frameless,
  transparent, always-on-top window. Owns no vault data; it talks to the main
  window's renderer over the `window.kls` bridge (spotlight-preload.js).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src https: data:;"
    />
    <style>
      :root {
        --bg: rgb(16 18 22 / 0.82);
        --border: rgb(255 255 255 / 0.1);
        --fg: rgb(236 238 242 / 1);
        --fg-subtle: rgb(150 156 168 / 1);
        --brand: #6d7ff5;
        --sel: rgb(109 127 245 / 0.18);
        --radius: 20px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        background: transparent;
        overflow: hidden;
        height: 100%;
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          "Segoe UI",
          system-ui,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
        padding: 8px;
      }
      .panel {
        background: var(--bg);
        -webkit-backdrop-filter: blur(40px) saturate(1.6);
        backdrop-filter: blur(40px) saturate(1.6);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow:
          0 24px 64px rgb(0 0 0 / 0.5),
          inset 0 1px 0 0 rgb(255 255 255 / 0.06);
        overflow: hidden;
      }
      .search {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 20px;
        height: 64px;
        -webkit-app-region: drag;
      }
      .search svg {
        flex: 0 0 auto;
        color: var(--fg-subtle);
      }
      .search input {
        -webkit-app-region: no-drag;
        flex: 1 1 auto;
        background: transparent;
        border: none;
        outline: none;
        color: var(--fg);
        font-size: 18px;
        font-weight: 500;
      }
      .search input::placeholder {
        color: var(--fg-subtle);
      }
      .results {
        list-style: none;
        max-height: 420px;
        overflow-y: auto;
      }
      .results:not(:empty) {
        border-top: 1px solid var(--border);
        padding: 6px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 9px 12px;
        border-radius: 12px;
        cursor: pointer;
      }
      .row.sel {
        background: var(--sel);
      }
      .avatar {
        flex: 0 0 auto;
        width: 32px;
        height: 32px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: linear-gradient(135deg, rgb(109 127 245 / 0.25), rgb(109 127 245 / 0.1));
        color: var(--brand);
        font-weight: 700;
        font-size: 14px;
        border: 1px solid var(--border);
      }
      .avatar img {
        width: 20px;
        height: 20px;
        object-fit: contain;
        border-radius: 4px;
      }
      .avatar.sm {
        width: 26px;
        height: 26px;
        border-radius: 8px;
        font-size: 12px;
      }
      .avatar.sm img {
        width: 16px;
        height: 16px;
      }
      .meta {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .title {
        display: block;
        color: var(--fg);
        font-size: 14px;
        font-weight: 500;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sub {
        display: block;
        color: var(--fg-subtle);
        font-size: 12px;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .kind {
        flex: 0 0 auto;
        color: var(--fg-subtle);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .chevron {
        flex: 0 0 auto;
        color: var(--fg-subtle);
        opacity: 0;
      }
      .row.sel .chevron {
        opacity: 0.7;
      }
      .submenu-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
      }
      .submenu-head .back {
        flex: 0 0 auto;
        color: var(--fg-subtle);
      }
      .submenu-head .name {
        flex: 1 1 auto;
        color: var(--fg);
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .action-icon {
        flex: 0 0 auto;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgb(255 255 255 / 0.05);
        color: var(--fg-subtle);
        border: 1px solid var(--border);
      }
      .row.sel .action-icon {
        color: var(--brand);
        background: rgb(109 127 245 / 0.12);
      }
      .action-meta {
        flex: 1 1 auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .action-label {
        color: var(--fg);
        font-size: 14px;
        font-weight: 500;
        line-height: 1.25;
      }
      .action-value {
        color: var(--fg-subtle);
        font-size: 12px;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .hint {
        display: flex;
        gap: 16px;
        padding: 8px 16px;
        border-top: 1px solid var(--border);
        color: var(--fg-subtle);
        font-size: 11px;
      }
      .hint b {
        color: var(--fg);
        font-weight: 600;
      }
      .empty {
        padding: 16px 20px;
        color: var(--fg-subtle);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
          <path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <input
          id="q"
          type="text"
          placeholder="Search your vault…"
          autocomplete="off"
          spellcheck="false"
          autofocus
        />
      </div>
      <div id="submenuHead" class="submenu-head" style="display: none">
        <svg class="back" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path
            d="M15 18l-6-6 6-6"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span class="avatar sm" id="submenuIcon"></span>
        <span class="name" id="submenuName"></span>
      </div>
      <ul id="results" class="results"></ul>
      <div id="hint" class="hint" style="display: none">
        <span><b>↵ Enter</b> <span id="lblCopyPassword">copy password</span></span>
        <span><b>→</b> <span id="lblMoreOptions">more options</span></span>
        <span><b>Esc</b> <span id="lblClose">close</span></span>
      </div>
      <div id="hintSub" class="hint" style="display: none">
        <span><b>↵ Enter</b> <span id="lblCopy">copy</span></span>
        <span><b>←</b> <span id="lblBack">back</span></span>
        <span><b>Esc</b> <span id="lblClose2">close</span></span>
      </div>
    </div>

    <script>
      (function () {
        var kls = window.kls;
        var input = document.getElementById("q");
        var list = document.getElementById("results");
        var hint = document.getElementById("hint");
        var hintSub = document.getElementById("hintSub");
        var submenuHead = document.getElementById("submenuHead");
        var submenuName = document.getElementById("submenuName");

        var mode = "list"; // "list" | "submenu"
        var items = [];
        var sel = 0;
        var subItem = null; // the item whose submenu is open
        var actions = [];
        var subSel = 0;
        var debounce;

        // Translated UI strings, pushed from the renderer (English defaults).
        var labels = {
          placeholder: "Search your vault…",
          copyPassword: "copy password",
          moreOptions: "more options",
          copy: "copy",
          back: "back",
          close: "close",
          noMatches: "No matches",
          nothingToCopy: "Nothing to copy",
        };

        function setText(id, value) {
          var el = document.getElementById(id);
          if (el && value) {
            el.textContent = value;
          }
        }

        function applyLabels(next) {
          if (!next) {
            return;
          }
          labels = Object.assign(labels, next);
          input.placeholder = labels.placeholder;
          setText("lblCopyPassword", labels.copyPassword);
          setText("lblMoreOptions", labels.moreOptions);
          setText("lblClose", labels.close);
          setText("lblClose2", labels.close);
          setText("lblCopy", labels.copy);
          setText("lblBack", labels.back);
        }

        function syncHeight() {
          // Let the window grow/shrink to fit content.
          var h = document.querySelector(".panel").offsetHeight + 16;
          if (kls) {
            kls.resize(h);
          }
        }

        function escapeHtml(s) {
          return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
          });
        }

        var CHEVRON =
          '<svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">' +
          '<path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

        var ACTION_ICONS = {
          username:
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 20a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
          password:
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="4" y="10" width="16" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="2"/></svg>',
          totp: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
          openfill:
            '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M14 4h6v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 4l-9 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        };

        // Build an avatar element: favicon image when available, letter fallback
        // (also used if the image fails to load).
        function buildAvatar(item, small) {
          var av = document.createElement("span");
          av.className = "avatar" + (small ? " sm" : "");
          var letter = (item.title || "?").charAt(0).toUpperCase();
          if (item.iconUrl) {
            var img = document.createElement("img");
            img.alt = "";
            img.referrerPolicy = "no-referrer";
            img.addEventListener("error", function () {
              av.textContent = letter;
            });
            img.src = item.iconUrl;
            av.appendChild(img);
          } else {
            av.textContent = letter;
          }
          return av;
        }

        function renderList() {
          submenuHead.style.display = "none";
          hintSub.style.display = "none";
          list.innerHTML = "";
          if (!input.value.trim()) {
            hint.style.display = "none";
            syncHeight();
            return;
          }
          if (items.length === 0) {
            list.innerHTML = '<li class="empty">' + escapeHtml(labels.noMatches) + "</li>";
            hint.style.display = "none";
            syncHeight();
            return;
          }
          items.forEach(function (it, i) {
            var li = document.createElement("li");
            li.className = "row" + (i === sel ? " sel" : "");
            li.innerHTML =
              '<span class="meta"><span class="title">' +
              escapeHtml(it.title) +
              "</span>" +
              '<span class="sub">' +
              escapeHtml(it.subtitle || "") +
              "</span></span>" +
              '<span class="kind">' +
              escapeHtml(it.kind || "") +
              "</span>" +
              CHEVRON;
            li.insertBefore(buildAvatar(it, false), li.firstChild);
            li.addEventListener("click", function () {
              sel = i;
              activate("password");
            });
            list.appendChild(li);
          });
          hint.style.display = "flex";
          syncHeight();
        }

        function renderSubmenu() {
          hint.style.display = "none";
          submenuName.textContent = subItem ? subItem.title : "";
          // Refresh the header favicon.
          var newIcon = subItem ? buildAvatar(subItem, true) : document.createElement("span");
          newIcon.id = "submenuIcon";
          document.getElementById("submenuIcon").replaceWith(newIcon);
          submenuHead.style.display = "flex";
          list.innerHTML = "";
          if (actions.length === 0) {
            list.innerHTML = '<li class="empty">' + escapeHtml(labels.nothingToCopy) + "</li>";
            hintSub.style.display = "none";
            syncHeight();
            return;
          }
          actions.forEach(function (a, i) {
            var li = document.createElement("li");
            li.className = "row" + (i === subSel ? " sel" : "");
            li.innerHTML =
              '<span class="action-icon">' +
              (ACTION_ICONS[a.action] || "") +
              "</span>" +
              '<span class="action-meta"><span class="action-label">' +
              escapeHtml(a.label) +
              "</span>" +
              (a.hint ? '<span class="action-value">' + escapeHtml(a.hint) + "</span>" : "") +
              "</span>";
            li.addEventListener("click", function () {
              subSel = i;
              activate(a.action);
            });
            list.appendChild(li);
          });
          hintSub.style.display = "flex";
          syncHeight();
        }

        function render() {
          if (mode === "submenu") {
            renderSubmenu();
          } else {
            renderList();
          }
        }

        function openSubmenu() {
          var it = items[sel];
          if (!it || !kls) {
            return;
          }
          subItem = it;
          actions = [];
          subSel = 0;
          mode = "submenu";
          kls.requestActions(it.id);
          render();
        }

        function closeSubmenu() {
          mode = "list";
          subItem = null;
          actions = [];
          render();
          input.focus();
        }

        function activate(action) {
          var it = mode === "submenu" ? subItem : items[sel];
          if (it && kls) {
            kls.activate(it.id, action);
          }
        }

        input.addEventListener("input", function () {
          if (mode === "submenu") {
            return;
          }
          clearTimeout(debounce);
          var q = input.value;
          debounce = setTimeout(function () {
            if (kls) {
              kls.search(q);
            }
          }, 90);
        });

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            if (mode === "submenu") {
              closeSubmenu();
            } else if (kls) {
              kls.close();
            }
            e.preventDefault();
            return;
          }
          if (mode === "submenu") {
            if (e.key === "ArrowDown") {
              subSel = Math.min(actions.length - 1, subSel + 1);
              render();
              e.preventDefault();
            } else if (e.key === "ArrowUp") {
              subSel = Math.max(0, subSel - 1);
              render();
              e.preventDefault();
            } else if (e.key === "ArrowLeft") {
              closeSubmenu();
              e.preventDefault();
            } else if (e.key === "Enter") {
              var a = actions[subSel];
              if (a) {
                activate(a.action);
              }
              e.preventDefault();
            }
            return;
          }
          // list mode
          if (e.key === "ArrowDown") {
            sel = Math.min(items.length - 1, sel + 1);
            render();
            e.preventDefault();
          } else if (e.key === "ArrowUp") {
            sel = Math.max(0, sel - 1);
            render();
            e.preventDefault();
          } else if (e.key === "ArrowRight") {
            openSubmenu();
            e.preventDefault();
          } else if (e.key === "Enter") {
            activate("password");
            e.preventDefault();
          }
        });

        if (kls) {
          kls.onResults(function (next) {
            if (mode === "submenu") {
              return;
            }
            items = Array.isArray(next) ? next : [];
            sel = 0;
            render();
          });
          kls.onActions(function (payload) {
            if (mode !== "submenu" || !subItem || !payload || payload.id !== subItem.id) {
              return;
            }
            actions = Array.isArray(payload.actions) ? payload.actions : [];
            subSel = 0;
            render();
          });
          kls.onReset(function () {
            mode = "list";
            subItem = null;
            actions = [];
            input.value = "";
            items = [];
            sel = 0;
            render();
            input.focus();
          });
          kls.onLabels(applyLabels);
        }

        input.focus();
        syncHeight();
      })();
    </script>
  </body>
</html>
